apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-cuda-shim
data:
  libcuda_shim.c: |
    #define _GNU_SOURCE
    #include <stdlib.h>
    #include <string.h>

    typedef int cudaError_t;
    typedef int CUresult;
    typedef int CUdevice;
    typedef void *CUcontext;
    typedef void *CUmodule;
    typedef void *CUfunction;
    typedef unsigned long long CUdeviceptr;

    #define cudaSuccess 0
    #define cudaErrorInvalidValue 1
    #define CUDA_SUCCESS 0
    #define CUDA_ERROR_INVALID_VALUE 1

    cudaError_t cudaGetDeviceCount(int *count) {
      if (!count) return cudaErrorInvalidValue;
      const char *env = getenv("FAKE_GPU_COUNT");
      if (!env) {
        *count = 1;
        return cudaSuccess;
      }
      int v = atoi(env);
      *count = (v > 0) ? v : 1;
      return cudaSuccess;
    }

    cudaError_t cudaSetDevice(int device) {
      (void)device;
      return cudaSuccess;
    }

    cudaError_t cudaMalloc(void **devPtr, size_t size) {
      if (!devPtr) return cudaErrorInvalidValue;
      *devPtr = malloc(size);
      if (!*devPtr) return 2;
      return cudaSuccess;
    }

    cudaError_t cudaFree(void *devPtr) {
      free(devPtr);
      return cudaSuccess;
    }

    cudaError_t cudaMemcpy(void *dst, const void *src, size_t count, int kind) {
      (void)kind;
      if (!dst || !src) return cudaErrorInvalidValue;
      memcpy(dst, src, count);
      return cudaSuccess;
    }

    CUresult cuInit(unsigned int flags) {
      (void)flags;
      return CUDA_SUCCESS;
    }

    CUresult cuDriverGetVersion(int *driverVersion) {
      if (!driverVersion) return CUDA_ERROR_INVALID_VALUE;
      *driverVersion = 12040;
      return CUDA_SUCCESS;
    }

    CUresult cuDeviceGetCount(int *count) {
      if (!count) return CUDA_ERROR_INVALID_VALUE;
      const char *env = getenv("FAKE_GPU_COUNT");
      if (!env) {
        *count = 1;
        return CUDA_SUCCESS;
      }
      int v = atoi(env);
      *count = (v > 0) ? v : 1;
      return CUDA_SUCCESS;
    }

    CUresult cuDeviceGet(CUdevice *device, int ordinal) {
      if (!device || ordinal < 0) return CUDA_ERROR_INVALID_VALUE;
      *device = ordinal;
      return CUDA_SUCCESS;
    }

    CUresult cuDeviceGetName(char *name, int len, CUdevice dev) {
      (void)dev;
      if (!name || len <= 0) return CUDA_ERROR_INVALID_VALUE;
      const char *model = getenv("FAKE_GPU_MODEL");
      if (!model || model[0] == '\0') model = "Fake GPU";
      strncpy(name, model, (size_t)(len - 1));
      name[len - 1] = '\0';
      return CUDA_SUCCESS;
    }

    CUresult cuCtxCreate_v2(CUcontext *pctx, unsigned int flags, CUdevice dev) {
      (void)flags;
      (void)dev;
      if (!pctx) return CUDA_ERROR_INVALID_VALUE;
      *pctx = (void *)0x1;
      return CUDA_SUCCESS;
    }

    CUresult cuCtxDestroy_v2(CUcontext ctx) {
      (void)ctx;
      return CUDA_SUCCESS;
    }

    CUresult cuModuleLoadData(CUmodule *module, const void *image) {
      (void)image;
      if (!module) return CUDA_ERROR_INVALID_VALUE;
      *module = (void *)0x1;
      return CUDA_SUCCESS;
    }

    CUresult cuModuleUnload(CUmodule hmod) {
      (void)hmod;
      return CUDA_SUCCESS;
    }

    CUresult cuModuleGetFunction(CUfunction *hfunc, CUmodule hmod, const char *name) {
      (void)hmod;
      (void)name;
      if (!hfunc) return CUDA_ERROR_INVALID_VALUE;
      *hfunc = (void *)0x1;
      return CUDA_SUCCESS;
    }
    
    CUresult cuPointerGetAttribute(void *data, int attribute, CUdeviceptr ptr) {
      (void)attribute;
      (void)ptr;
      if (!data) return CUDA_ERROR_INVALID_VALUE;
      *(int *)data = 0;
      return CUDA_SUCCESS;
    }
    
    CUresult cuDeviceGetAttribute(int *pi, int attrib, CUdevice dev) {
      (void)attrib;
      (void)dev;
      if (!pi) return CUDA_ERROR_INVALID_VALUE;
      *pi = 1;
      return CUDA_SUCCESS;
    }
    
    int cuTensorMapEncodeTiled(void *tensorMap, int tensorDataType, unsigned int tensorRank,
                               void *globalAddress, const unsigned long long *globalDim,
                               const unsigned long long *globalStrides,
                               const unsigned int *boxDim, const unsigned int *elementStrides,
                               int interleave, int swizzle, int l2Promotion, int oobFill) {
      (void)tensorMap;
      (void)tensorDataType;
      (void)tensorRank;
      (void)globalAddress;
      (void)globalDim;
      (void)globalStrides;
      (void)boxDim;
      (void)elementStrides;
      (void)interleave;
      (void)swizzle;
      (void)l2Promotion;
      (void)oobFill;
      return CUDA_SUCCESS;
    }
  libnvidia_ml_shim.c: |
    #define _GNU_SOURCE
    #include <stdint.h>
    #include <stdlib.h>
    #include <string.h>
    
    typedef int nvmlReturn_t;
    typedef void *nvmlDevice_t;
    
    #define NVML_SUCCESS 0
    #define NVML_ERROR_INVALID_ARGUMENT 2
    
    nvmlReturn_t nvmlInit_v2(void) {
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlInit(void) {
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlInitWithFlags(unsigned int flags) {
      (void)flags;
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlShutdown(void) {
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlSystemGetDriverVersion(char *version, unsigned int length) {
      if (!version || length == 0) return NVML_ERROR_INVALID_ARGUMENT;
      const char *fake = "555.42.02";
      strncpy(version, fake, length - 1);
      version[length - 1] = '\0';
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlDeviceGetCount_v2(unsigned int *deviceCount) {
      if (!deviceCount) return NVML_ERROR_INVALID_ARGUMENT;
      const char *env = getenv("FAKE_GPU_COUNT");
      if (!env) {
        *deviceCount = 1;
        return NVML_SUCCESS;
      }
      int v = atoi(env);
      *deviceCount = (v > 0) ? (unsigned int)v : 1U;
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlDeviceGetCount(unsigned int *deviceCount) {
      return nvmlDeviceGetCount_v2(deviceCount);
    }
    
    nvmlReturn_t nvmlDeviceGetHandleByIndex_v2(unsigned int index, nvmlDevice_t *device) {
      if (!device) return NVML_ERROR_INVALID_ARGUMENT;
      *device = (void *)(uintptr_t)(index + 1);
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlDeviceGetHandleByIndex(unsigned int index, nvmlDevice_t *device) {
      return nvmlDeviceGetHandleByIndex_v2(index, device);
    }
    
    nvmlReturn_t nvmlDeviceGetName(nvmlDevice_t device, char *name, unsigned int length) {
      (void)device;
      if (!name || length == 0) return NVML_ERROR_INVALID_ARGUMENT;
      const char *model = getenv("FAKE_GPU_MODEL");
      if (!model || model[0] == '\0') model = "Fake GPU";
      strncpy(name, model, length - 1);
      name[length - 1] = '\0';
      return NVML_SUCCESS;
    }
    
    nvmlReturn_t nvmlDeviceGetCudaComputeCapability(nvmlDevice_t device, int *major, int *minor) {
      (void)device;
      if (!major || !minor) return NVML_ERROR_INVALID_ARGUMENT;
      *major = 9;
      *minor = 0;
      return NVML_SUCCESS;
    }
    
    const char *nvmlErrorString(nvmlReturn_t result) {
      (void)result;
      return "NVML shim";
    }
