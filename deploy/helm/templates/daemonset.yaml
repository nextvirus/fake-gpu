apiVersion: v1
kind: ServiceAccount
metadata:
  name: fake-gpu-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fake-gpu-plugin
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fake-gpu-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fake-gpu-plugin
subjects:
  - kind: ServiceAccount
    name: fake-gpu-plugin
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fake-gpu-config
  namespace: kube-system
data:
  config.yaml: |
    resourceNames:
{{- range .Values.config.resourceNames }}
      - {{ . | quote }}
{{- end }}
    gpuCount: {{ .Values.config.gpuCount }}
    gpuMemoryMiB: {{ .Values.config.gpuMemoryMiB }}
    gpuModel: {{ .Values.config.gpuModel | quote }}
    cudaVersion: {{ .Values.config.cudaVersion | quote }}
    sharingFactor: {{ .Values.config.sharingFactor }}
    requireNodeLabel: {{ .Values.config.requireNodeLabel }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fake-gpu-plugin
  namespace: kube-system
  labels:
    app: fake-gpu-plugin
spec:
  selector:
    matchLabels:
      app: fake-gpu-plugin
  template:
    metadata:
      labels:
        app: fake-gpu-plugin
    spec:
      serviceAccountName: fake-gpu-plugin
      priorityClassName: system-node-critical
      containers:
        - name: fake-gpu-plugin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: FAKE_GPU_CONFIG_PATH
              value: /etc/fake-gpu/config.yaml
            - name: FAKE_GPU_NODE_LABELS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels
{{- if .Values.metrics.enabled }}
          ports:
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
{{- end }}
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: fake-gpu-config
              mountPath: /etc/fake-gpu
              readOnly: true
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: fake-gpu-config
          configMap:
            name: fake-gpu-config
